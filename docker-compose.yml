services:
  postgres:
    image: postgres:15-alpine
    container_name: taller_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-parking}
    volumes:
      - parking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  python-api:
    build:
      context: ./taller_de_desarrollo
      dockerfile: Dockerfile
    container_name: taller_python_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/parking}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  node-api:
    build:
      context: ./taller_de_desarrollo/backend-node
      dockerfile: Dockerfile
    container_name: taller_node_api
    ports:
      - "3000:3000"
    environment:
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_DATABASE=${POSTGRES_DB:-parking}
      - PYTHON_API_URL=http://python-api:8000/api/v1/parking
    depends_on:
      postgres:
        condition: service_healthy
      python-api:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./taller_de_desarrollo/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://node-api:3000/api/parking
    container_name: taller_frontend
    ports:
      - "5173:80"
    depends_on:
      node-api:
        condition: service_started
    networks:
      - app-network

volumes:
  parking_data:

networks:
  app-network:
